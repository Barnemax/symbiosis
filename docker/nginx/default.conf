# Rate-limit write methods only. Empty key = no limit (reads pass through freely).
map $request_method $write_limit_key {
    default         "";
    POST            $binary_remote_addr;
    PATCH           $binary_remote_addr;
    PUT             $binary_remote_addr;
    DELETE          $binary_remote_addr;
}
limit_req_zone $write_limit_key zone=api_writes:10m rate=20r/m;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        limit_req zone=api_writes burst=5 nodelay;
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
