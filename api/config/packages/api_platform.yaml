api_platform:
    title: '%app.name%'
    version: 1.0.0
    formats:
        jsonld:
            mime_types: ['application/ld+json']
        json:
            mime_types: ['application/json']
    docs_formats:
        jsonld:
            mime_types: ['application/ld+json']
        jsonopenapi:
            mime_types: ['application/vnd.openapi+json']
        html:
            mime_types: ['text/html']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
